name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Match the release workflow.
          node-version: '24'

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      # Call the local Playwright binary directly rather than via `npx`, matching release.yml and
      # avoiding any npm/registry resolution (see the note there re: `.npmrc` min-release-age).
      # The timeout fails fast instead of hanging for hours if browser provisioning ever stalls.
      - name: Install playwright browsers
        timeout-minutes: 8
        run: ./node_modules/.bin/playwright install --with-deps

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present
