name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Match the release workflow (Node 24) so PR tests reproduce the release environment,
          # including the Playwright browser-install hang we're chasing.
          node-version: '24'

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      # Call the local Playwright binary directly rather than via `npx`, matching release.yml and
      # avoiding any npm/registry resolution (see the note there re: `.npmrc` min-release-age).
      # DEBUG=pw:install surfaces each download/extract step; the timeout fails fast instead of
      # hanging for hours if the browser provisioning stalls (as it does in the release job).
      - name: Install playwright browsers
        timeout-minutes: 8
        env:
          DEBUG: pw:install
        run: ./node_modules/.bin/playwright install --with-deps

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present
