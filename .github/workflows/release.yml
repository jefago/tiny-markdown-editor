name: Release

on:
  push:
    tags:
      - 'v*' # e.g. v1.2.3

permissions:
  id-token: write     # <-- required for npm OIDC
  contents: write     # <-- to create GitHub Release
  actions: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release   # <-- match the npm Trusted Publisher config if you used one
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      # Call the Playwright binary installed by `npm ci` directly rather than via `npx`, so the
      # repo's `.npmrc` `min-release-age` never triggers a registry resolution for this step.
      # The timeout fails fast instead of hanging for hours if browser provisioning ever stalls
      # (Node 24.16.0 + Playwright < 1.60 hung here during zip extraction — fixed by upgrading
      # Playwright to >= 1.60; see microsoft/playwright#41000, nodejs/node#63487).
      - name: Install playwright browsers
        timeout-minutes: 8
        run: ./node_modules/.bin/playwright install --with-deps

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

      # OIDC auth happens transparently; no NODE_AUTH_TOKEN needed
      # --provenance adds supply-chain attestation shown on npm
      - name: Publish to npm (with provenance)
        run: npm publish --provenance

      # Compress dist files for release
      - name: Compress dist files
        run: cd dist && zip -r ../tiny-mde.${{ github.ref_name }}.zip . && cd ..

      # Create a GitHub Release from the tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: tiny-mde.${{ github.ref_name }}.zip